<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      width: 300px;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c4b5fd;
    }

    .logo span {
      color: #e8e8f0;
    }

    .url-box {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.72rem;
      color: #6b6b80;
      word-break: break-all;
      margin-bottom: 16px;
      min-height: 32px;
    }

    .result {
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .result.loading {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      color: #6b6b80;
    }

    .result.safe {
      background: #0d2310;
      border: 1px solid #1a4a20;
      color: #4ade80;
    }

    .result.unsafe {
      background: #230d0d;
      border: 1px solid #4a1a1a;
      color: #f87171;
    }

    .result.error {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      color: #6b6b80;
    }

    .result-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid #2a2a3a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .sub {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Phish<span>Guard</span></div>
  </div>

  <div class="url-box" id="urlDisplay">Checking...</div>

  <div class="result loading" id="result">
    <div class="spinner"></div>
    <div>Analyzing URL...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
